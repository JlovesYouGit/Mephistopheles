<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Mesh Visualizer</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; background: #050505; color: #00ffcc; font-family: 'Courier New', Courier, monospace; overflow: hidden; }
        #info { position: absolute; top: 10px; left: 10px; z-index: 10; background: rgba(0,0,0,0.7); padding: 10px; border: 1px solid #00ffcc; }
        canvas { display: block; }
    </style>
</head>
<body>
    <div id="info">
        <div>NEXUS STATUS: <span id="status">OFFLINE</span></div>
        <div>CPU LOAD: <span id="cpu">0</span>%</div>
        <div>ENERGY DRAW: <span id="energy">0</span></div>
        <div>PHI CONSTANT: 2.34</div>
        <div>BOUND WIDTH: <span id="width">0</span></div>
        <div>DISSIPATION/QBIT: <span id="dissipation">0</span></div>
    </div>
    <script>
        let scene, camera, renderer, mesh, particles = [];
        const stateFile = 'mesh_state.json';

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(5, 5, 5);
            camera.lookAt(0, 0, 0);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // X Plain Mesh (Grid)
            const gridHelper = new THREE.GridHelper(10, 20, 0x00ffcc, 0x222222);
            scene.add(gridHelper);

            // Gravitational Dent (Funnel)
            const geometry = new THREE.PlaneGeometry(10, 10, 50, 50);
            const material = new THREE.MeshBasicMaterial({ color: 0x004444, wireframe: true, transparent: true, opacity: 0.5 });
            mesh = new THREE.Mesh(geometry, material);
            mesh.rotation.x = -Math.PI / 2;
            scene.add(mesh);

            animate();
            setInterval(updateState, 500);
        }

        async function updateState() {
            try {
                const response = await fetch(stateFile);
                if (!response.ok) throw new Error('State file not ready');
                const state = await response.json();

                document.getElementById('status').innerText = 'RESONATING';
                document.getElementById('cpu').innerText = state.metrics.cpu.toFixed(1);
                document.getElementById('energy').innerText = state.metrics.energy.toFixed(3);
                document.getElementById('width').innerText = state.bound_width.toExponential(2);
                document.getElementById('dissipation').innerText = state.dissipation_per_qbit.toFixed(5);

                // Update Mesh (Dent)
                const vertices = mesh.geometry.attributes.position.array;
                const dentDepth = state.bound_y;
                for (let i = 0; i < vertices.length; i += 3) {
                    const x = vertices[i];
                    const z = vertices[i + 1]; // Plane is XY, so z is upward in local
                    const dist = Math.sqrt(x*x + z*z);
                    vertices[i + 2] = dentDepth / (1.0 + dist); 
                }
                mesh.geometry.attributes.position.needsUpdate = true;

                // Update Particles
                updateParticles(state.particles);

            } catch (e) {
                document.getElementById('status').innerText = 'ERROR: ' + e.message;
            }
        }

        function updateParticles(data) {
            // Remove old
            particles.forEach(p => scene.remove(p));
            particles = [];

            data.forEach(p => {
                const geometry = new THREE.SphereGeometry(p.size, 8, 8);
                const material = new THREE.MeshBasicMaterial({ color: 0xff3333 });
                const sphere = new THREE.Mesh(geometry, material);
                sphere.position.set(p.x, p.y, p.z);
                scene.add(sphere);
                particles.push(sphere);
            });
        }

        function animate() {
            requestAnimationFrame(animate);
            scene.rotation.y += 0.005;
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        init();
    </script>
</body>
</html>
